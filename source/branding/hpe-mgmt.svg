<?xml version="1.0" encoding="UTF-8"?>
<!--
  HPE-SMH plugin icon — design intent reference.

  Three stacked elements on a transparent background:
    1. "HPE" wordmark, uppercase, black, top of canvas.
    2. Hollow horizontal rectangle in HPE green (#01A982), 3-px stroke,
       transparent fill, sharp corners, ~6:1 aspect ratio — echoes
       the HPE corporate "Element" mark.  Acts as a horizontal
       separator between the two wordmarks.
    3. "mngr" wordmark, lowercase, black, smaller than HPE, below the
       rectangle.

  This SVG is the source-of-truth for the design.  The shipping PNGs
  (icons/ + images/) are produced by source/branding/render-icon.py
  (pure-stdlib bitmap font, no librsvg/imagemagick/PIL needed).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64" width="64" height="64">

  <!-- "HPE" uppercase, top -->
  <text x="32" y="24" text-anchor="middle"
        font-family="sans-serif" font-weight="900" font-size="22"
        letter-spacing="1" fill="#181818">HPE</text>

  <!-- HPE Element bar: 50×8, sharp corners, 3-px stroke, transparent fill -->
  <rect x="7" y="31" width="50" height="8"
        fill="none" stroke="#01A982" stroke-width="3"/>

  <!-- "mngr" lowercase, bottom -->
  <text x="32" y="58" text-anchor="middle"
        font-family="sans-serif" font-weight="900" font-size="14"
        letter-spacing="1" fill="#181818">mngr</text>
</svg>
